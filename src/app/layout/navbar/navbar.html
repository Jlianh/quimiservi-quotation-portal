<header class="sticky top-0 z-40 w-full border-b border-border bg-background/85 backdrop-blur">
  <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
    <a routerLink="/" class="flex min-w-0 items-center gap-2.5" (click)="close()">
      <span class="grid h-9 w-9 shrink-0 place-items-center rounded-lg bg-navy text-white shadow-sm">
        <lucide-angular [img]="Droplet" class="h-5 w-5"></lucide-angular>
      </span>
      <span class="flex min-w-0 flex-col gap-1 leading-tight">
        <app-brand-wordmark [height]="16" class="text-navy" />
        <span class="hidden truncate text-[11px] text-muted-foreground sm:block">
          {{ company.tagline }}
        </span>
      </span>
    </a>

    <nav class="hidden items-center gap-1 md:flex">
      @for (link of navLinks; track link.path) {
        <a
          [routerLink]="link.path"
          routerLinkActive="text-primary"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="rounded-md px-3 py-2 text-sm font-medium text-foreground/70 transition-colors hover:bg-muted hover:text-foreground"
        >
          {{ link.label }}
        </a>
      }
    </nav>

    <div class="flex items-center gap-2">
      <a
        routerLink="/cotizacion"
        class="relative inline-flex items-center gap-2 rounded-md border border-border bg-background px-3 py-2 text-sm font-medium text-foreground transition hover:border-primary hover:text-primary"
        aria-label="Ver cotización"
      >
        <lucide-angular [img]="ShoppingCart" class="h-4 w-4"></lucide-angular>
        <span class="hidden sm:inline">Cotizar</span>
        @if (count() > 0) {
          <span class="ml-0.5 grid h-5 min-w-5 place-items-center rounded-full bg-primary px-1 text-[11px] font-bold text-white">
            {{ count() }}
          </span>
        }
      </a>
      <button
        type="button"
        (click)="toggle()"
        class="grid h-10 w-10 place-items-center rounded-md border border-border text-foreground md:hidden"
        aria-label="Menú"
      >
        <lucide-angular [img]="open() ? X : Menu" class="h-5 w-5"></lucide-angular>
      </button>
    </div>
  </div>

  @if (open()) {
    <div class="border-t border-border bg-background md:hidden">
      <nav class="mx-auto flex max-w-7xl flex-col px-4 py-2 sm:px-6">
        @for (link of navLinks; track link.path) {
          <a
            [routerLink]="link.path"
            (click)="close()"
            class="rounded-md px-3 py-2.5 text-sm font-medium text-foreground/80 hover:bg-muted"
          >
            {{ link.label }}
          </a>
        }
      </nav>
    </div>
  }
</header>
