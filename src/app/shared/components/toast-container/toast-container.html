<div class="pointer-events-none fixed inset-x-0 bottom-0 z-50 flex flex-col items-center gap-2 p-4 sm:items-end">
  @for (toast of toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex w-full max-w-sm items-start gap-3 rounded-xl border border-border bg-background p-4 shadow-[var(--shadow-elevated)]"
      role="status"
    >
      <lucide-angular
        [img]="iconFor(toast.type)"
        class="mt-0.5 h-5 w-5 shrink-0"
        [class.text-success]="toast.type === 'success'"
        [class.text-destructive]="toast.type === 'error'"
        [class.text-primary]="toast.type === 'info'"
      ></lucide-angular>
      <div class="min-w-0 flex-1">
        <p class="text-sm font-semibold text-foreground">{{ toast.title }}</p>
        @if (toast.description) {
          <p class="mt-0.5 text-xs text-muted-foreground">{{ toast.description }}</p>
        }
      </div>
      <button
        type="button"
        class="text-muted-foreground hover:text-foreground"
        aria-label="Cerrar"
        (click)="dismiss(toast.id)"
      >
        <lucide-angular [img]="X" class="h-4 w-4"></lucide-angular>
      </button>
    </div>
  }
</div>
